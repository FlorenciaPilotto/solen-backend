events {
    worker_connections 1024;
}

http {
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    upstream solen_auth      { server solen-auth:8001; }
    upstream solen_protocols { server solen-protocols:8002; }
    upstream solen_analytics { server solen-analytics:8003; }
    upstream solen_notify    { server solen-notify:8004; }
    upstream solen_ai        { server solen-ai:8005; }

    server {
        listen 80;
        server_name _;

        # CORS global
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        # Health general
        location /health {
            return 200 '{"status":"ok","service":"solen-gateway"}';
            add_header Content-Type application/json;
        }

        # Auth — rate limit más estricto en register/login
        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass         http://solen_auth;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        # Protocols
        location ~ ^/api/v1/(estado|protocolo|coach) {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://solen_protocols;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        # Analytics
        location ~ ^/api/v1/(analytics|events) {
            limit_req zone=api burst=30 nodelay;
            proxy_pass         http://solen_analytics;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        # Notifications
        location /api/v1/notify/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://solen_notify;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        # AI — sesión emocional con Claude (timeout extendido)
        location /api/v1/ai/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass         http://solen_ai;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # Docs (solo en dev)
        location ~ ^/(auth|protocols|analytics|notify)/docs {
            proxy_pass http://solen_$1;
        }
    }
}
