events {
    worker_connections 1024;
}

http {
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    upstream solen_auth      { server solen-auth:8001; }
    upstream solen_protocols { server solen-protocols:8002; }
    upstream solen_analytics { server solen-analytics:8003; }
    upstream solen_notify    { server solen-notify:8004; }

    server {
        listen 80;
        server_name _;

        # CORS global
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        # Health general
        location /health {
            return 200 '{"status":"ok","service":"solen-gateway"}';
            add_header Content-Type application/json;
        }

        # Redirect /openapi.json based on referrer
        location = /openapi.json {
            if ($http_referer ~* "/auth/docs") {
                rewrite ^ /auth/openapi.json last;
            }
            if ($http_referer ~* "/protocols/docs") {
                rewrite ^ /protocols/openapi.json last;
            }
            if ($http_referer ~* "/analytics/docs") {
                rewrite ^ /analytics/openapi.json last;
            }
            if ($http_referer ~* "/notify/docs") {
                rewrite ^ /notify/openapi.json last;
            }
            # Fallback: default to auth service
            rewrite ^ /auth/openapi.json last;
        }

        # Auth — rate limit más estricto en register/login
        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass         http://solen_auth;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        # Protocols
        location ~ ^/api/v1/(estado|protocolo) {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://solen_protocols;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        # Analytics
        location ~ ^/api/v1/(analytics|events) {
            limit_req zone=api burst=30 nodelay;
            proxy_pass         http://solen_analytics;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        # Notifications
        location /api/v1/notify/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://solen_notify;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        # Docs (solo en dev)
        location ~ ^/auth/(docs|openapi\.json) {
            rewrite ^/auth/(.+) /$1 break;
            proxy_pass http://solen_auth;
        }
        location ~ ^/protocols/(docs|openapi\.json) {
            rewrite ^/protocols/(.+) /$1 break;
            proxy_pass http://solen_protocols;
        }
        location ~ ^/analytics/(docs|openapi\.json) {
            rewrite ^/analytics/(.+) /$1 break;
            proxy_pass http://solen_analytics;
        }
        location ~ ^/notify/(docs|openapi\.json) {
            rewrite ^/notify/(.+) /$1 break;
            proxy_pass http://solen_notify;
        }
    }
}