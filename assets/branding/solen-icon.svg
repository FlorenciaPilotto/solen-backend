<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14161B"/>
      <stop offset="100%" stop-color="#0B0C10"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F3D9A4"/>
      <stop offset="100%" stop-color="#BA7517"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FBEBC8"/>
      <stop offset="100%" stop-color="#D9A646"/>
    </radialGradient>
  </defs>

  <!-- App icon background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Fine sunburst rays -->
  <g stroke="url(#gold)" stroke-width="2" stroke-linecap="round" opacity="0.85">
    <line x1="256" y1="92"  x2="256" y2="124"/>
    <line x1="256" y1="388" x2="256" y2="420"/>
    <line x1="92"  y1="256" x2="124" y2="256"/>
    <line x1="388" y1="256" x2="420" y2="256"/>
    <line x1="146" y1="146" x2="169" y2="169"/>
    <line x1="343" y1="343" x2="366" y2="366"/>
    <line x1="366" y1="146" x2="343" y2="169"/>
    <line x1="169" y1="343" x2="146" y2="366"/>
  </g>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="108" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.9"/>

  <!-- Inner refined ring -->
  <circle cx="256" cy="256" r="88" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>

  <!-- Core -->
  <circle cx="256" cy="256" r="34" fill="url(#core)"/>
</svg>
